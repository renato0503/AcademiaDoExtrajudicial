name: Deploy static content to Pages

on:
  push:
    branches: ["main", "master"]

  # Permite execução manual a partir da aba Actions no GitHub
  workflow_dispatch:

# Define permissões necessárias para o deploy no GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Garante apenas um deploy simultâneo em execução
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Código
        uses: actions/checkout@v4
        
      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          
      - name: Instalar Dependências
        run: npm install
        
      - name: Executar Build do Vite
        run: npm run build
        
      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v4
        
      - name: Upload do Artefato Dist
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'
          
      - name: Deploy para GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
